<!-- Write a javascript program to calculate the Fibonacci sequence -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<script>   
var a=0,b=1,c;
document.write("Fibonacci<br>");

while(b<=10)
{
     c = a + b;
    document.write(c+"<br>"); 
    a = b;
    b = c;
}
</script>
</body>
</html>
